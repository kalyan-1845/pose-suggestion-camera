name: pose_suggestion_camera
description: AI-powered camera app with real-time pose guidance and auto-capture.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.1
  google_mlkit_pose_detection: ^0.14.1
  google_mlkit_commons: ^0.11.0
  provider: ^6.1.2
  image: ^4.3.0
  path_provider: ^2.1.4
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  animated_text_kit: ^4.2.2
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1
  pro_image_editor: ^12.4.3
  pdf: ^3.12.0
  qr_flutter: ^4.1.0
  google_mlkit_barcode_scanning: ^0.14.2
  network_info_plus: ^7.0.0
  http: ^1.6.0
  google_mlkit_selfie_segmentation: ^0.10.1
  gal: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
